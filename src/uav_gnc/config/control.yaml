control_node:
  ros__parameters:
    dt: 0.01
    mass: 2.0
    Ix: 0.02
    Iy: 0.02
    Iz: 0.04
    g: 9.80665
    use_drag: true
    k1: 0.15
    k2: 0.02
    odom_topic: "/nav/odom" # 노이즈 없는 상태를 보려면(guidacne only) /sim/odom으로 
    # ===== 제어기 추종 성능을 높이기 위해 새로 추가하는 값들 ===== 
    kp_pos_xy: 1.5 # 1.5
    kp_pos_z: 2.0 # Lag 감소를 위해 P,D 게인 강화 
    kp_vel_xy: 2.5 # 2.5
    kp_vel_z: 5.0 # Lag 감소를 위해 P,D 게인 강화 
    max_tilt_deg: 35.0
    # 적분 제어 게인 파라미터(끄고 싶으면 값 I 게인 0으로)
    ki_vel_xy: 1.0 # 0.5 1.0
    # 공기 저항으로 인한 지연 현상을 없애기 위해 적분기 값 늘림
    ki_vel_z: 1.0 # 1.0
    max_int_vxy: 3.0 # 5.0
    max_int_vz: 3.0 # 5.0
        # 가이던스의 3D 목표 속도/가속도가 짤리지 않도록 리밋 넉넉하게 확장
    max_vxy_cmd: 5.0
    max_axy_cmd: 10.0
    max_vz_cmd: 5.0   # 기존 2.0 -> 5.0
    max_az_cmd: 10.0  # 기존 6.0 -> 10.0
    # ===== Linear MPC 제어기 설정 =====
    use_mpc: false
    mpc_N: 15
    mpc_q_pos_xy: 50.0
    mpc_q_pos_z:  200.0
    mpc_q_vel_xy: 20.0
    mpc_q_vel_z:  30.0
    mpc_r_acc_xy: 2.0
    mpc_r_acc_z:  0.5
    # ===== MPC+I 적분 보상 게인 (바람 등 지속 외란 보상) =====
    # ki 값이 너무 크면 오버슈트, 너무 작으면 수렴이 느림
    # max_int_pos: anti-windup 한계 (m/s² 단위로 누적 가속도 상한)
    mpc_ki_pos_xy:   0.2
    mpc_ki_pos_z:    0.1
    mpc_max_int_pos: 4.0